services:
  evonet-api:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: evonet_api_core
    volumes:
      - ./workspace:/workspace
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8080:8080"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5.11
    container_name: evonet_neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  evonet-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: evonet_dashboard
    ports:
      - "8081:8081"
    env_file:
      - .env
    command: python app/dashboard.py
    restart: unless-stopped
    depends_on:
      evonet-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8081/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

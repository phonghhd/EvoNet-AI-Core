name: EvoNet Holy Trinity Pipeline

# Lên lịch chạy tự động: 00:00 sáng Thứ Hai hàng tuần
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  # ==========================================
  # TRẠM 1: BOT TRINH SÁT (TÌM CVE NGUY HIỂM)
  # ==========================================
  bot_1_harvester:
    name: 🕵️‍♂️ Lọc CVE Nguy Hiểm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      
      # Chạy script 1 (Tái sử dụng cái hồi chiều, nhưng sẽ nâng cấp sau để chỉ lọc lỗi Nặng)
      - name: Kích hoạt Bot 1 cào CVE
        run: python app/scripts/fetch_weekly_cves.py

      # Đóng gói dữ liệu vứt lên "băng chuyền" (Artifact) để chuyển cho Bot 2
      - name: Gửi dữ liệu lên băng chuyền
        uses: actions/upload-artifact@v4
        with:
          name: cve-data-stage-1
          path: data/latest_threats.json

  # ==========================================
  # TRẠM 2: BOT TIN TẶC (SĂN MÃ KHAI THÁC - PoC)
  # ==========================================
  bot_2_poc_hunter:
    name: 🥷 Săn Mã Khai Thác (PoC)
    needs: bot_1_harvester # LỆNH QUYỀN LỰC: Phải chờ Trạm 1 chạy xong mới được chạy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      
      # Nhận gói dữ liệu từ Trạm 1 rớt xuống
      - name: Nhận dữ liệu từ Trạm 1
        uses: actions/download-artifact@v4
        with:
          name: cve-data-stage-1
          path: data/

      # Kích hoạt Bot 2 đi lùng PoC 
      - name: Kích hoạt Bot 2 đi săn PoC
        run: python app/scripts/hunt_poc.py

      # Đóng gói dữ liệu đã nhồi thêm PoC lên băng chuyền cho Bot 3
      - name: Gửi dữ liệu lên băng chuyền
        uses: actions/upload-artifact@v4
        with:
          name: cve-data-stage-2
          path: data/latest_threats.json

  # ==========================================
  # TRẠM 3: BOT BÁC SĨ (PHÂN TÍCH BẢN VÁ & LƯU TRỮ)
  # ==========================================
  bot_3_patch_analyzer:
    name: 🛡️ Phân Tích Bản Vá & Lưu Trữ
    needs: bot_2_poc_hunter 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      
      # Nhận gói dữ liệu từ Trạm 2 rớt xuống
      - name: Nhận dữ liệu từ Trạm 2
        uses: actions/download-artifact@v4
        with:
          name: cve-data-stage-2
          path: data/

      - name: Kích hoạt Bot 3 cào Code Patch Diff
        run: python app/scripts/analyze_patch.py

      - name: Lưu trữ thành quả hoàn chỉnh lên EvoNet
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "EvoNet-Trinity-Bot"
          git add -f data/latest_threats.json
          
          # Dùng IF ELSE chuẩn mực để kiểm tra, chỉ thẳng mặt nhánh main để push
          if ! git diff --staged --quiet; then
            git commit -m "🧠 Auto-update: Bộ dữ liệu AI Training (CVE + PoC + Patch)"
            git push origin main
          else
            echo "💤 Không có sự thay đổi dữ liệu, hệ thống đi ngủ."
          fi

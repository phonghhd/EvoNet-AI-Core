name: EvoNet CVE Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot_1_harvester:
    name: CVE Harvester
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch high-severity CVEs
        run: python app/scripts/fetch_weekly_cves.py
      - name: Upload CVE data
        uses: actions/upload-artifact@v4
        with:
          name: cve-data-stage-1
          path: data/latest_threats.json
          retention-days: 1

  bot_2_poc_hunter:
    name: PoC Hunter
    needs: bot_1_harvester
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Download CVE data
        uses: actions/download-artifact@v4
        with:
          name: cve-data-stage-1
          path: data/
      - name: Hunt PoC on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python app/scripts/hunt_poc.py
      - name: Upload PoC data
        uses: actions/upload-artifact@v4
        with:
          name: cve-data-stage-2
          path: data/latest_threats.json
          retention-days: 1

  bot_3_patch_analyzer:
    name: Patch Analyzer
    needs: bot_2_poc_hunter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests python-dotenv
      - name: Download PoC data
        uses: actions/download-artifact@v4
        with:
          name: cve-data-stage-2
          path: data/
      - name: Generate patches with AI
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: python app/scripts/analyze_patch.py
      - name: Commit results
        run: |
          git config --local user.email "evonet-bot@users.noreply.github.com"
          git config --local user.name "EvoNet-Bot"
          git add -f data/latest_threats.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: CVE + PoC + Patch data"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
